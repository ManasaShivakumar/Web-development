<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
</head>
<body>
    <form action="/server">
        <h1>Registration Form</h1>
        <div>
            <label for="FN"></label>
            <input type="text" id="FN" placeholder="First Name" name="FN">
            <label for="LN"></label>
            <input type="text" id="LN" placeholder="Last Name" name="LN">
        </div>
        <div>
            <label for="gen">Please select gender</label>
            <select id="gen" name="gen">
                <option value="M">Male</option>
                <option value="F">Female</option>
                <option value="O">Others</option>
            </select>
        </div>    
        <div>
            Do you agree to all terms of service?
            <input type="checkbox" id="agree" name="agree" checked>
            <label for="agree">Yes, I agree</label>
        </div>     
        <button type="submit">Register</button>
    </form>
</body>
</html>
