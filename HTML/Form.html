    <form action="/search">
        <input type="checkbox" id="age" name="age">
        <label for="age">I am 18+</label>
        <div>
            <input type="radio" id="apple" name="fruits" value="apple" >
            <label for="apple">Apple</label>
            <br>
            <input type="radio" id="mango" name="fruits" value="mango" >
            <label for="mango">Mango</label>
            <br>
            <input type="radio" id="banana" name="fruits" value="banana" >
            <label for="banana">Banana</label>
            <br>
        </div>
        <div>
            Choose your subjects
            <br>
            <input type="checkbox" id="math" name="sub" value="math">
            <label for="math">Maths</label>
            <br>
            <input type="checkbox" id="science" name="sub" value="sci">
            <label for="science">Science</label>
            <br>
            <input type="checkbox" id="bio" name="sub" value="bio">
            <label for="bio">Biology</label>
            <br>
            <input type="checkbox" id="phy" name="sub" value="phy">
            <label for="phy">Physics</label>
            <br>
        </div>
        <div>
            Select your profestion
            <br>
            <label for="profession">Check here</label>
            <select name="profession" id="profession">
                <option>select ur option</option>
                <option value="stu">Student</option>
                <option value="dev" selected>Developer</option>
            </select>            
        </div>
        <br>
        <label for="vol">volume</label>
        <input type="range" id="vol" name="vol" min="0" max="100" step="10" value="70">
        <br>
        <label for="feedback">please share your feedback</label>     
        <textarea id="feedback" name="fb" placeholder="write here" rows="5" cols="50"></textarea> 
        <button>submit</button>  
    </form>
